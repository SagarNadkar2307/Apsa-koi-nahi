<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Morning Chiku ❤️</title>

  <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        overflow: hidden;

        background:
            linear-gradient(rgba(255,182,193,0.5), rgba(255,228,196,0.5)),
            url('morning.jpg');  /* 👈 add your image */

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    @keyframes gradient {
        0% {background-position: 0%}
        50% {background-position: 100%}
        100% {background-position: 0%}
    }

    .container {
        padding: 20px;
        color: white;
        display: none;
    }

    h1 {
        font-size: 2em;
    }

    p {
        font-size: 1.2em;
    }

    /* Start screen */
    .start-screen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: black;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-size: 1.5em;
        z-index: 10;
    }

    /* Slideshow */
    .slideshow {
        margin-top: 20px;
        width: 90%;
        max-width: 350px;
        height: 300px;
        margin-left: auto;
        margin-right: auto;
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        background: rgba(0,0,0,0.2);
    }

    .slideshow {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
    }

    .slideshow img {
        max-width: 100%;
        max-height: 100%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); /* 🔥 center fix */
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }

    .slideshow img.active {
        opacity: 1;
    }

    /* Hearts */
    .heart {
        position: absolute;
        color: red;
        animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
        from {
            transform: translateY(100vh);
            opacity: 1;
        }
        to {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }
  </style>
</head>

<body>

<!-- Start Screen -->
<div class="start-screen" onclick="startExperience()">
  💖 Tap to open your surprise 💖
</div>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainContent">
  <h1>Good Morning Chiku ❤️</h1>
  <p>
    My cutie, my bestest BooBoo, my Sexy wife 💕 <br><br>
    I Miss You 💔 <br>
    You are the most beautiful and my bestest PomPom 🌸 <br><br>
    I love you more than anything ❤️
  </p>

  <div class="slideshow">
    <img src="photo1.jpg" class="active">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
    <img src="photo5.jpg">
  </div>
</div>

<script>
  function startExperience() {
      document.querySelector(".start-screen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";

      let music = document.getElementById("bgMusic");
      music.play(); // ✅ now works after user click
  }

  // Slideshow
  let slides = document.querySelectorAll(".slideshow img");
  let index = 0;

  setInterval(() => {
      slides[index].classList.remove("active");
      index = (index + 1) % slides.length;
      slides[index].classList.add("active");
  }, 3000);

  // Hearts
  function createHeart() {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
  }

  setInterval(createHeart, 300);
</script>

</body>
</html>
